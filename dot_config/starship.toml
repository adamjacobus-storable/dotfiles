$git_branch\
$git_status\
[¯é░](fg:bg_lighter bg:bg_light)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:bg_light bg:bg_lighter)\
