"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](bg_lighter)\
$os\
$username\
[¯é░](bg:bg_light fg:bg_lighter)\
$directory\
[¯é░](bg:bg_lighter fg:bg_light)\
