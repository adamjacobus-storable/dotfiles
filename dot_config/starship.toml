palette = 'dracula'

[os]
disabled = false
style = "bg:bg_lighter fg:purple"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = false 
style_user = "bg:bg_lighter fg:purple"
style_root = "bg:bg_lighter fg:red"
format = '[ $user]($style)'

[directory]
style = "bg:bg_light fg:cyan"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Projects" = "¾░▓ï "

[custom.git_common_dir]
when = "test -f .git"
symbol = "¯ù╗"
command = "git rev-parse --path-format=absolute --git-common-dir | xargs dirname | xargs basename"
format = "[[ $symbol $output](fg:pink bg:bg_lighter)]($style)"

[git_branch]
symbol = "´Éÿ"
style = "bg:pink"
format = '[[ $symbol $branch ](fg:pink bg:bg_lighter)]($style)'
truncation_length = 30

[git_status]
style = "bg:pink"
format = '[[($all_status$ahead_behind )](fg:pink bg:bg_lighter)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[java]
symbol = "¯ëû "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:green bg:bg_light)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:green bg:bg_light)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:comment"
format = '[[ $symbol( $context) ](fg:crust bg:comment)]($style)'

[conda]
symbol = " ´äî "
style = "fg:comment bg:bg_lighter"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = true 
time_format = "%_I:%M %p"
style = "bg:comment"
format = '[[ ´É║ $time ](fg:comment bg:bg_light)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:purple)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:purple)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:purple"
disabled = true
show_notifications = true
min_time_to_notify = 45000

